services:
  - type: web
    name: fraud-detection-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: IBM_QUANTUM_TOKEN
        sync: false
    healthCheckPath: /
